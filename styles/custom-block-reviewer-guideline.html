<!-- 
  Custom Block Manager - Reviewer Guideline Link Button
  File: custom-block-reviewer-guideline.html
  
  Instruksi Penggunaan:
  1. Login sebagai Journal Manager/Admin
  2. Website Settings → Appearance → Sidebar
  3. Klik "Add Block"
  4. Tipe: Custom HTML
  5. Copy-paste kode di bawah ke text area
  6. Simpan
  
  Pastikan:
  - Path "/journal-path/reviewer-guideline" disesuaikan dengan path navigation item Anda
  - FontAwesome library sudah ter-load (biasanya default di OJS 3.x)
-->

<!-- ========== OPTION 1: Dengan FontAwesome Icon (Recommended) ========== -->
<div class="custom-reviewer-block">
  <style>
    .custom-reviewer-block {
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 1.5rem;
    }

    .reviewer-guideline-btn {
      display: inline-block;
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 123, 255, 0.3);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .reviewer-guideline-btn:hover {
      background: linear-gradient(135deg, #0056b3 0%, #003d82 100%);
      box-shadow: 0 4px 12px rgba(0, 86, 179, 0.4);
      transform: translateY(-2px);
      text-decoration: none;
      color: white;
    }

    .reviewer-guideline-btn:active {
      transform: translateY(0);
    }

    .reviewer-guideline-btn i {
      margin-right: 0.5rem;
      font-size: 1.1em;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .custom-reviewer-block {
        padding: 0.75rem;
        margin-bottom: 1rem;
      }

      .reviewer-guideline-btn {
        padding: 0.875rem;
        font-size: 0.95rem;
      }

      .reviewer-guideline-btn i {
        margin-right: 0.35rem;
        font-size: 1em;
      }
    }

    @media (max-width: 480px) {
      .custom-reviewer-block {
        padding: 0.5rem;
        margin-bottom: 0.75rem;
      }

      .reviewer-guideline-btn {
        padding: 0.75rem 0.5rem;
        font-size: 0.9rem;
      }

      .reviewer-guideline-btn i {
        margin-right: 0.25rem;
      }
    }
  </style>

  <!-- Button dengan FontAwesome Icon -->
  <a href="{$baseUrl}/reviewer-guideline" class="reviewer-guideline-btn" title="Baca panduan untuk reviewer">
    <i class="fa fa-book" aria-hidden="true"></i>
    <span>Panduan Reviewer</span>
  </a>
</div>

<!-- ========== CATATAN PENTING ========== -->
<!-- 
  KONFIGURASI PENTING:

  1. URL PATH:
     - Ganti "/reviewer-guideline" sesuai dengan path navigation menu item Anda
     - Contoh lain: "/about/reviewer-guideline"
     - Gunakan {$baseUrl} untuk relative URL (OJS Smarty variable)

  2. LANGKAH IMPLEMENTASI DI OJS:
     a. Login sebagai Journal Manager
     b. Buka: Website Settings → Appearance → Sidebar
     c. Klik tombol "Add Block"
     d. Pilih Type: "Custom HTML" atau "Custom"
     e. Paste kode HTML dari salah satu OPTION di atas
     f. Klik "Save"

  3. MEMILIH OPSI YANG TEPAT:
     - OPTION 1: Recommended jika FontAwesome sudah ter-load
     - OPTION 2: Gunakan jika FontAwesome tidak tersedia
     - OPTION 3: Untuk tampilan lebih profesional dengan deskripsi
     - OPTION 4: Jika ingin tampilan paling sederhana

  4. TESTING:
     - Desktop (1920px+): Tombol full width di sidebar
     - Tablet (768px): Padding reduced
     - Mobile (480px): Optimal untuk tampilan phone

  5. TROUBLESHOOTING:
     - Jika icon tidak muncul: Gunakan OPTION 2 atau 4
     - Jika styling tidak cocok: Sesuaikan color #007bff ke brand color Anda
     - Jika link tidak bekerja: Verifikasi path di URL

  6. CUSTOMIZATION:
     - Ubah warna: Ganti #007bff dengan color code lain
     - Ubah teks: Edit "Panduan Reviewer" 
     - Ubah icon: Edit emoji atau FontAwesome class
     - Ubah deskripsi: Edit teks di .reviewer-block-desc

  7. FONTAWESOME COLORS:
     - Buku: fa-book (pilihan default)
     - Buku dengan bookmark: fa-bookmark
     - Info: fa-info
     - Checklist: fa-check-square
     - Guide: fa-compass

  Untuk dokumentasi lebih lanjut, lihat file:
  /styles/NAVIGATION_MENU_CUSTOM_HEADER_README.md
-->
